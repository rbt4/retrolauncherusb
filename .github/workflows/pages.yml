name: Build and deploy Plugcade
on:
  push:
    branches: [main]
    paths: ["launcher/**", "tests/**", "web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate launcher source
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const html = fs.readFileSync("launcher/Plugcade.hta", "utf8");
          const scripts = [...html.matchAll(/<script language="JScript">([\s\S]*?)<\/script>/ig)].map(match => match[1]);
          if (!scripts.length) throw new Error("Plugcade JScript block is missing");
          new Function(scripts.join("\n"));
          [
            "launcher/START_PLUGCADE.bat",
            "launcher/START_WINDOWS_98_EXPERIMENTAL.BAT",
            "launcher/PLUGCADE-LITE.bat",
            "launcher/README.txt",
            "launcher/CHANGELOG.txt",
            "launcher/PLATFORMS.txt",
            "launcher/Config/ai-helper.example.ini",
            "launcher/DROP_GAMES_HERE/_SMART_INBOX/README.txt",
            "launcher/Emulators/README.txt"
          ].forEach((path) => {
            if (!fs.existsSync(path)) throw new Error(path + " is missing");
          });
          const platformCount = (scripts.join("\n").match(/P\("/g) || []).length;
          if (platformCount < 26) throw new Error("Expected at least 26 platform adapters");
          console.log("Launcher source passed validation with " + platformCount + " adapters.");
          NODE
          node tests/launcher-smoke.js

      - name: Build portable Core download
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in Path("launcher").rglob("*"):
              if path.is_file() and path.suffix.lower() in {".bat", ".hta", ".txt", ".ini"}:
                  data = path.read_bytes().replace(b"\r\n", b"\n").replace(b"\n", b"\r\n")
                  path.write_bytes(data)
          PY
          mkdir -p web/downloads
          (cd launcher && zip -qr -FS -X ../web/downloads/Plugcade-Core-0.4-alpha.zip .)
          (cd web/downloads && sha256sum Plugcade-Core-0.4-alpha.zip > Plugcade-Core-0.4-alpha.sha256.txt)

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
